<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JEWEL BLAST</title>
  <link rel="icon" type="image/jpeg" href="https://maximumreality.github.io/game/jewel-icon.jpeg">
<link rel="apple-touch-icon" href="https://maximumreality.github.io/game/jewel-icon.jpeg">

<meta name="theme-color" content="#05030f">
<meta name="msapplication-TileColor" content="#05030f">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JEWEL BLAST">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05030f;
    --panel: #0d0920;
    --border: #2a1a5e;
    --neon-blue: #00f0ff;
    --neon-pink: #ff00aa;
    --neon-green: #00ff88;
    --neon-gold: #ffcc00;
    --neon-purple: #cc00ff;
    --text: #c0b8e8;
    --dim: #4a3a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(80,0,120,0.3) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(0,60,120,0.2) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* HEADER */
  header {
    text-align: center;
    width: 100%;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: 2.4rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink), var(--neon-gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(0,240,255,0.5));
    animation: titlePulse 3s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,240,255,0.5)); }
    50% { filter: drop-shadow(0 0 40px rgba(255,0,170,0.7)); }
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 8px;
    width: 100%;
    justify-content: space-between;
  }

  .stat-box {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .stat-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
    animation: scanLine 2s linear infinite;
  }

  @keyframes scanLine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .stat-label {
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 2px;
  }

  .stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--neon-blue);
  }

  #score-val { color: var(--neon-gold); }
  #best-val { color: var(--neon-green); }
  #moves-val { color: var(--neon-pink); }
  #level-val { color: var(--neon-purple); }

  /* PROGRESS BAR */
  .progress-wrap {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  #level-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 10px var(--neon-blue);
    border-radius: 3px;
  }

  /* POWER-UPS */
  .powerup-bar {
    display: flex;
    gap: 8px;
    width: 100%;
    justify-content: center;
  }

  .pu-btn {
    flex: 1;
    max-width: 90px;
    padding: 8px 6px;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .pu-btn:hover:not(:disabled), .pu-btn:active:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,240,255,0.3);
    border-color: var(--neon-blue);
  }

  .pu-btn.active {
    border-color: var(--neon-gold);
    box-shadow: 0 0 15px rgba(255,204,0,0.5);
    animation: pulseBorder 0.5s ease infinite alternate;
  }

  @keyframes pulseBorder {
    from { box-shadow: 0 0 10px rgba(255,204,0,0.4); }
    to { box-shadow: 0 0 25px rgba(255,204,0,0.8); }
  }

  .pu-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .pu-icon { font-size: 1.4rem; }
  .pu-name { font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
  .pu-count {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    color: var(--neon-gold);
  }

  /* GAME BOARD */
  #game-canvas {
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow:
      0 0 40px rgba(0,240,255,0.1),
      inset 0 0 40px rgba(0,0,0,0.5);
    cursor: pointer;
    touch-action: none;
    max-width: 100%;
  }

  /* MESSAGE OVERLAY */
  #message {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,3,15,0.92);
    z-index: 100;
    gap: 16px;
    backdrop-filter: blur(4px);
  }

  #message.hidden { display: none; }

  .msg-title {
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
  }

  .msg-body {
    font-size: 1rem;
    color: var(--text);
    text-align: center;
    line-height: 1.6;
  }

  .msg-scores {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    text-align: center;
    min-width: 260px;
  }

  .score-history {
    max-height: 160px;
    overflow-y: auto;
    margin-top: 10px;
  }

  .score-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.8rem;
  }

  .score-row:first-child { color: var(--neon-gold); font-weight: 600; }
  .score-row span:last-child { font-family: 'Orbitron', monospace; color: var(--neon-blue); }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 32px;
    border: 1px solid var(--neon-blue);
    background: rgba(0,240,255,0.08);
    color: var(--neon-blue);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover, .btn:active {
    background: rgba(0,240,255,0.2);
    box-shadow: 0 0 20px rgba(0,240,255,0.4);
  }

  /* Floating score pop */
  .score-pop {
    position: fixed;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 1.2rem;
    pointer-events: none;
    z-index: 200;
    animation: popUp 1s ease forwards;
    text-shadow: 0 0 10px currentColor;
  }

  @keyframes popUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
  }

  /* Combo indicator */
  #combo-display {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--neon-gold);
    text-shadow: 0 0 20px var(--neon-gold);
    height: 36px;
    display: flex;
    align-items: center;
    transition: opacity 0.3s;
    letter-spacing: 0.1em;
  }

  #combo-display.hidden { opacity: 0; }

  .footer {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--dim);
    text-align: center;
    padding-bottom: 12px;
  }
</style>
</head>
<body>

<div id="message">
  <div class="msg-title" id="msg-title">JEWEL BLAST</div>
  <div class="msg-body" id="msg-body">Match 3 or more gems to score.<br>Chain combos for massive points!</div>
  <div class="msg-scores">
    <div style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--dim);margin-bottom:8px">Your Best Scores</div>
    <div class="score-history" id="score-history"></div>
  </div>
  <button class="btn" id="start-btn" onclick="startGame()">▶ PLAY</button>
</div>

<div id="app">
  <button id="mute-btn" onclick="toggleMute()" style="position:absolute; top:15px; right:15px; background:none; border:none; color:var(--neon-blue); font-size:1.5rem; cursor:pointer; z-index:1000; text-shadow: 0 0 10px var(--neon-blue); -webkit-tap-highlight-color:transparent;">🔊</button>

  <header>
    <h1>JEWEL BLAST</h1>
  </header>

  <div class="stats-bar">
    <div class="stat-box">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score-val">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Best</div>
      <div class="stat-value" id="best-val">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves-val">30</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Level</div>
      <div class="stat-value" id="level-val">1</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div id="level-bar"></div>
  </div>

  <div id="combo-display" class="hidden"></div>

  <div class="powerup-bar">
    <button class="pu-btn" id="pu-bomb" onclick="activatePowerup('bomb')" title="Bomb: Destroys 3x3 area">
      <span class="pu-icon">💣</span>
      <span class="pu-name">Bomb</span>
      <span class="pu-count" id="pu-bomb-count">3</span>
    </button>
    <button class="pu-btn" id="pu-lightning" onclick="activatePowerup('lightning')" title="Lightning: Clears a row">
      <span class="pu-icon">⚡</span>
      <span class="pu-name">Row Zap</span>
      <span class="pu-count" id="pu-lightning-count">3</span>
    </button>
    <button class="pu-btn" id="pu-rainbow" onclick="activatePowerup('rainbow')" title="Rainbow: Clears all of one color">
      <span class="pu-icon">🌈</span>
      <span class="pu-name">Rainbow</span>
      <span class="pu-count" id="pu-rainbow-count">2</span>
    </button>
    <button class="pu-btn" id="pu-shuffle" onclick="activatePowerup('shuffle')" title="Shuffle: Reshuffles the board">
      <span class="pu-icon">🔀</span>
      <span class="pu-name">Shuffle</span>
      <span class="pu-count" id="pu-shuffle-count">2</span>
    </button>
    <button class="pu-btn" id="pu-freeze" onclick="activatePowerup('freeze')" title="Freeze: +5 free moves">
      <span class="pu-icon">❄️</span>
      <span class="pu-name">+5 Moves</span>
      <span class="pu-count" id="pu-freeze-count">2</span>
    </button>
  </div>

  <canvas id="game-canvas"></canvas>

  <div class="footer">SLIDE TO SWAP · MATCH 3+ TO BLAST · CHAIN COMBOS</div>
</div>

<script>
let isMuted = false;
const sfx = {
  pop: new Audio('https://maximumreality.github.io/game/audio/pop.mp3'),
  swap: new Audio('https://maximumreality.github.io/game/audio/swap.mp3'),
  win: new Audio('https://maximumreality.github.io/game/audio/won.mp3'),
  powerup: new Audio('https://maximumreality.github.io/game/audio/powerup.mp3'),
  bgm: new Audio('https://maximumreality.github.io/game/audio/ambient.mp3') 
};

// Music setup
sfx.bgm.loop = true;
sfx.bgm.volume = 0.4;

function play(sound) {
  if (isMuted) return;
  try {
    const click = sound.cloneNode();
    click.volume = 0.6;
    click.play().catch(() => {
      sound.currentTime = 0;
      sound.play().catch(() => {});
    });
  } catch (e) {
    console.log("Audio play error", e);
  }
}

function toggleMute() {
  isMuted = !isMuted;
  const btn = document.getElementById('mute-btn');
  if (btn) btn.textContent = isMuted ? '🔇' : '🔊';
  
  if (isMuted) {
    sfx.bgm.pause();
  } else {
    sfx.bgm.play().catch(() => {});
  }
}

// ===================== CONSTANTS =====================
const COLS = 8, ROWS = 8;
const GEM_TYPES = 6;
const MOVES_PER_LEVEL = 30;

const GEM_COLORS = [
  { fill: '#00f0ff', glow: '#00f0ff', label: 'cyan' },
  { fill: '#ff00aa', glow: '#ff2200', label: 'pink' },
  { fill: '#00ff88', glow: '#00ff00', label: 'green' },
  { fill: '#ffcc00', glow: '#ffaa00', label: 'gold' },
  { fill: '#cc00ff', glow: '#aa00ff', label: 'purple' },
  { fill: '#ff6600', glow: '#ff3300', label: 'orange' },
];

const GEM_SHAPES = ['diamond', 'hex', 'star', 'circle', 'square', 'triangle'];

// ===================== STATE =====================
let canvas, ctx, cellSize, boardOffX, boardOffY;
let board = [];
let selected = null;
let score = 0, moves = 0, level = 1, levelTarget = 500;
let bestScore = 0;
let scoreHistory = [];
let powerups = { bomb: 3, lightning: 3, rainbow: 2, shuffle: 2, freeze: 2 };
let activePowerup = null;
let animating = false;
let comboCount = 0;
let particles = [];
let gems = []; 

// ===================== STORAGE =====================
function loadStorage() {
  try {
    const saved = localStorage.getItem('jewelblast_v1');
    if (saved) {
      const d = JSON.parse(saved);
      bestScore = d.best || 0;
      scoreHistory = d.history || [];
    }
  } catch(e) {}
}

function saveStorage() {
  try {
    localStorage.setItem('jewelblast_v1', JSON.stringify({
      best: bestScore,
      history: scoreHistory.slice(0, 10)
    }));
  } catch(e) {}
}

// ===================== CANVAS SETUP =====================
function setupCanvas() {
  canvas = document.getElementById('game-canvas');
  ctx = canvas.getContext('2d');

  const maxW = Math.min(window.innerWidth - 24, 460);
  cellSize = Math.floor(maxW / COLS);
  canvas.width = cellSize * COLS;
  canvas.height = cellSize * ROWS;

  function getCell(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    return [Math.floor(y / cellSize), Math.floor(x / cellSize)];
  }

  function onDragStart(clientX, clientY) {
    if (animating) return;
    const [r, c] = getCell(clientX, clientY);
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
    dragStart = { r, c, x: clientX, y: clientY };
    selected = [r, c];
  }

  function onDragEnd(clientX, clientY) {
    if (!dragStart) return;
    const { r: sr, c: sc, x: sx, y: sy } = dragStart;
    dragStart = null;

    if (activePowerup) {
      selected = null;
      applyPowerupAt(sr, sc);
      return;
    }

    const dx = clientX - sx;
    const dy = clientY - sy;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist < cellSize * 0.25) return;

    selected = null;
    let tr = sr, tc = sc;
    if (Math.abs(dx) > Math.abs(dy)) {
      tc = dx > 0 ? sc + 1 : sc - 1;
    } else {
      tr = dy > 0 ? sr + 1 : sr - 1;
    }

    if (tr < 0 || tr >= ROWS || tc < 0 || tc >= COLS) return;
    animating = true;
    trySwap(sr, sc, tr, tc);
  }

  let dragStart = null;
  canvas.addEventListener('mousedown', e => onDragStart(e.clientX, e.clientY));
  canvas.addEventListener('mouseup',   e => onDragEnd(e.clientX, e.clientY));
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    onDragStart(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: false });
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    onDragEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }, { passive: false });
}

// ===================== BOARD LOGIC =====================
function initBoard() {
  board = [];
  gems = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    gems[r] = [];
    for (let c = 0; c < COLS; c++) {
      board[r][c] = randomGem(r, c);
      gems[r][c] = { x: c * cellSize, y: r * cellSize, targetX: c * cellSize, targetY: r * cellSize };
    }
  }
}

function randomGem(r, c) {
  let type;
  do {
    type = Math.floor(Math.random() * GEM_TYPES);
  } while (
    (c >= 2 && board[r][c-1] === type && board[r][c-2] === type) ||
    (r >= 2 && board[r-1][c] === type && board[r-2][c] === type)
  );
  return type;
}

function findMatches() {
  const matched = new Set();
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 2; c++) {
      const t = board[r][c];
      if (t !== null && board[r][c+1] === t && board[r][c+2] === t) {
        matched.add(`${r},${c}`); matched.add(`${r},${c+1}`); matched.add(`${r},${c+2}`);
      }
    }
  }
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 2; r++) {
      const t = board[r][c];
      if (t !== null && board[r+1][c] === t && board[r+2][c] === t) {
        matched.add(`${r},${c}`); matched.add(`${r+1},${c}`); matched.add(`${r+2},${c}`);
      }
    }
  }
  return [...matched].map(s => s.split(',').map(Number));
}

function clearMatches(matches) {
  const pts = matches.length * 10 * (1 + comboCount * 0.5);
  score += Math.round(pts);
  comboCount++;
  matches.forEach(([r,c]) => {
    spawnParticles(c * cellSize + cellSize/2, r * cellSize + cellSize/2, board[r][c]);
    board[r][c] = null;
  });
  updateUI();
  showCombo();
}

function dropGems() {
  for (let c = 0; c < COLS; c++) {
    let empty = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c] !== null) {
        if (r !== empty) {
          board[empty][c] = board[r][c];
          gems[empty][c].y = gems[r][c].y;
          board[r][c] = null;
        }
        empty--;
      }
    }
    for (let r = empty; r >= 0; r--) {
      board[r][c] = Math.floor(Math.random() * GEM_TYPES);
      gems[r][c].y = (r - (empty + 1)) * cellSize;
    }
  }
  syncGemTargets();
}

function syncGemTargets() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      gems[r][c].targetX = c * cellSize;
      gems[r][c].targetY = r * cellSize;
    }
}

async function processBoard() {
  animating = true;
  let matches;
  while ((matches = findMatches()).length > 0) {
    clearMatches(matches);
    play(sfx.pop);
    await delay(300);
    dropGems();
    await delay(400);
  }
  comboCount = 0;
  hideCombo();
  animating = false;
  if (moves <= 0) endGame();
}

async function trySwap(r1, c1, r2, c2) {
  play(sfx.swap);
  [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
  [gems[r1][c1], gems[r2][c2]] = [gems[r2][c2], gems[r1][c1]];
  syncGemTargets();
  await delay(250);
  if (findMatches().length === 0) {
    [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
    [gems[r1][c1], gems[r2][c2]] = [gems[r2][c2], gems[r1][c1]];
    syncGemTargets();
    await delay(200);
  } else {
    moves--;
    updateUI();
    await processBoard();
    checkLevelUp();
  }
  animating = false;
}

function activatePowerup(type) {
  if (!powerups[type] || animating) return;
  activePowerup = (activePowerup === type) ? null : type;
  updatePowerupUI();
}

function applyPowerupAt(r, c) {
  play(sfx.powerup);
  const type = activePowerup;
  powerups[type]--;
  activePowerup = null;
  updatePowerupUI();
  animating = true;
  
  let targets = [];
  if (type === 'bomb') {
    for (let i=-1; i<=1; i++) for (let j=-1; j<=1; j++) {
      let nr=r+i, nc=c+j;
      if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS) targets.push([nr,nc]);
    }
  } else if (type === 'lightning') {
    for (let i=0; i<COLS; i++) targets.push([r,i]);
  } else if (type === 'rainbow') {
    let color = board[r][c];
    for (let i=0; i<ROWS; i++) for (let j=0; j<COLS; j++) if (board[i][j]===color) targets.push([i,j]);
  } else if (type === 'shuffle') {
    shuffleBoard(); animating=false; return;
  } else if (type === 'freeze') {
    moves+=5; updateUI(); animating=false; return;
  }
  
  clearMatches(targets);
  setTimeout(() => { dropGems(); setTimeout(() => processBoard(), 400); }, 300);
}

function shuffleBoard() {
  let flat = board.flat();
  for (let i = flat.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [flat[i], flat[j]] = [flat[j], flat[i]];
  }
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) board[r][c] = flat[r * COLS + c];
}

function checkLevelUp() {
  if (score >= level * levelTarget) {
    level++; moves += 5;
    updateUI();
  }
}

function updateUI() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('best-val').textContent = bestScore;
  document.getElementById('moves-val').textContent = moves;
  document.getElementById('level-val').textContent = level;
  document.getElementById('level-bar').style.width = Math.min(100, (score/(level*levelTarget))*100) + '%';
  if (score > bestScore) { bestScore = score; saveStorage(); }
}

function updatePowerupUI() {
  ['bomb', 'lightning', 'rainbow', 'shuffle', 'freeze'].forEach(t => {
    const btn = document.getElementById(`pu-${t}`);
    document.getElementById(`pu-${t}-count`).textContent = powerups[t];
    btn.classList.toggle('active', activePowerup === t);
  });
}

function showCombo() {
  if (comboCount < 2) return;
  const el = document.getElementById('combo-display');
  el.textContent = `${comboCount}x COMBO!`;
  el.classList.remove('hidden');
}

function hideCombo() { document.getElementById('combo-display').classList.add('hidden'); }

function spawnParticles(x, y, colorIdx) {
  const color = GEM_COLORS[colorIdx]?.glow || '#fff';
  for (let i = 0; i < 8; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, alpha: 1, color, decay: 0.02 });
  }
}

function drawGem(ctx, x, y, size, type, sel = false) {
  const c = GEM_COLORS[type];
  const r = (size * 0.8) / 2;
  const cx = x + size/2, cy = y + size/2;
  ctx.save();
  ctx.translate(cx, cy);
  if (sel) { ctx.shadowBlur = 15; ctx.shadowColor = '#ffcc00'; ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3; ctx.strokeRect(-r,-r,r*2,r*2); }
  ctx.fillStyle = c.fill;
  ctx.shadowBlur = 10; ctx.shadowColor = c.glow;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const g = gems[r][c];
    g.x += (g.targetX - g.x) * 0.2; g.y += (g.targetY - g.y) * 0.2;
    if (board[r][c] !== null) drawGem(ctx, g.x, g.y, cellSize, board[r][c], selected && selected[0]===r && selected[1]===c);
  }
  particles = particles.filter(p => p.alpha > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
    ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(render);
}

function startGame() {
  if (!isMuted) sfx.bgm.play().catch(() => {});
  score = 0; moves = MOVES_PER_LEVEL; level = 1;
  powerups = { bomb: 3, lightning: 3, rainbow: 2, shuffle: 2, freeze: 2 };
  document.getElementById('message').classList.add('hidden');
  initBoard(); syncGemTargets(); updateUI(); updatePowerupUI();
}

function endGame() {
  play(sfx.win);
  document.getElementById('msg-title').textContent = "GAME OVER";
  document.getElementById('message').classList.remove('hidden');
}

function delay(ms) { return new Promise(res => setTimeout(res, ms)); }

loadStorage(); setupCanvas(); initBoard(); render();
</script>
