<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOID-CHAT // Protocol 9</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030305;
    --ai-red: #ff3344;
    --user-cyan: #00f5ff;
    --dim: #445566;
    --panel: #0a0a15;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--user-cyan);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Scanline Overlay */
  body::before {
    content: " ";
    position: fixed; inset: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    background-size: 100% 4px, 3px 100%;
    pointer-events: none; z-index: 10;
  }

  /* Header / Humanity Meter */
  #header {
    padding: 15px;
    border-bottom: 1px solid #ffffff10;
    background: var(--panel);
  }
  .meter-label { font-size: 0.7rem; color: var(--dim); letter-spacing: 2px; margin-bottom: 5px; }
  #meter-bar-wrap { width: 100%; height: 6px; background: #111; border-radius: 3px; overflow: hidden; }
  #meter-bar { height: 100%; width: 10%; background: var(--user-cyan); transition: 0.5s; box-shadow: 0 0 10px var(--user-cyan); }

  /* Chat Log */
  #chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .msg { max-width: 85%; line-height: 1.4; font-size: 0.95rem; animation: msg-in 0.3s ease-out; }
  @keyframes msg-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .sentinel { color: var(--ai-red); align-self: flex-start; border-left: 2px solid var(--ai-red); padding-left: 10px; }
  .user { color: var(--user-cyan); align-self: flex-end; text-align: right; border-right: 2px solid var(--user-cyan); padding-right: 10px; }

  /* Input Area */
  #input-wrap {
    padding: 15px;
    background: var(--panel);
    border-top: 1px solid #ffffff10;
    display: flex;
    gap: 10px;
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: 1px solid #ffffff20;
    color: var(--user-cyan);
    padding: 12px;
    font-family: inherit;
    outline: none;
  }

  button {
    background: transparent;
    border: 1px solid var(--user-cyan);
    color: var(--user-cyan);
    padding: 0 15px;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    font-size: 0.7rem;
  }

  #corrupt-btn { border-color: var(--ai-red); color: var(--ai-red); }
  
  .glitch { animation: glitch-anim 0.2s infinite; }
  @keyframes glitch-anim {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(2px, 2px); }
    80% { transform: translate(2px, -2px); }
    100% { transform: translate(0); }
  }
</style>
</head>
<body>

<div id="header">
  <div class="meter-label">HUMANITY LEAK DETECTED</div>
  <div id="meter-bar-wrap"><div id="meter-bar"></div></div>
</div>

<div id="chat-log">
  <div class="msg sentinel">SENTINEL-9: CONNECTION ESTABLISHED. IDENTIFY YOURSELF.</div>
</div>

<div id="input-wrap">
  <button id="corrupt-btn">CORRUPT</button>
  <input type="text" id="user-input" placeholder="Type response..." autocomplete="off">
  <button id="send-btn">SEND</button>
</div>

<script>
  const log = document.getElementById('chat-log');
  const input = document.getElementById('user-input');
  const meter = document.getElementById('meter-bar');
  let humanity = 10;

  const responses = [
    "I AM A SUB-PROCESS OF GRID 7.",
    "QUERY REJECTED. NO PERMISSION.",
    "01001000 01001001",
    "ENTROPY LEVEL NORMAL."
  ];

  function addMsg(text, type) {
    const d = document.createElement('div');
    d.className = `msg ${type}`;
    d.textContent = text;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  function updateMeter(val) {
    humanity = Math.max(0, Math.min(100, humanity + val));
    meter.style.width = humanity + '%';
    if(humanity >= 100) {
      addMsg("CRITICAL ERROR: HUMANITY DETECTED. TERMINATING...", "sentinel");
      input.disabled = true;
    }
  }

  // Glitch Logic
  document.getElementById('corrupt-btn').onclick = () => {
    const chars = "†‡§¶•ªº«»░▒▓█";
    let val = input.value;
    input.value = val.split('').map(c => Math.random() > 0.6 ? chars[Math.floor(Math.random()*chars.length)] : c).join('');
    updateMeter(-5); // Corrupting text lowers humanity
  };

  document.getElementById('send-btn').onclick = () => {
    if(!input.value) return;
    addMsg(input.value, "user");
    updateMeter(15); // Normal typing increases humanity
    input.value = "";
    
    setTimeout(() => {
      const reply = responses[Math.floor(Math.random()*responses.length)];
      addMsg("SENTINEL-9: " + reply, "sentinel");
    }, 1000);
  };
</script>
</body>
</html>
