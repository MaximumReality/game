<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Library | Maximum Reality</title>
<link rel="icon" href="https://maximumreality.xyz/logo.png">

<style>
  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%);
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
  }

  h1 {
    text-align: center;
    margin-top: 40px;
    font-size: 2rem;
    color: #ff00ff;
    text-shadow: 0 0 15px #ff00ff, 0 0 30px #ff00ff;
  }

  .word {
    position: absolute;
    font-size: calc(0.6rem + 1vw);
    opacity: 0.6;
    cursor: pointer;
    transition: transform 0.3s ease, color 0.3s ease;
    user-select: none;
  }

  .word:hover {
    color: #00ffff;
    transform: scale(1.3) rotate(5deg);
    opacity: 1;
    text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
  }

  .back-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 18px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 0.85rem;
    color: #ff00ff;
    border: 1px solid #ff00ff;
    background: rgba(0,0,0,0.5);
    text-decoration: none;
    text-align: center;
    box-shadow: 0 0 10px #ff00ff;
    transition: all 0.2s ease;
  }

  .back-btn:hover {
    background: rgba(255,0,255,0.2);
    transform: translateX(-50%) scale(1.05);
  }
</style>
</head>

<body>
<h1>📚 Neon Library</h1>

<a href="secret3.html" class="back-btn">Venture Deeper →</a>

<script>
  const words = [
    "glitch", "signal", "Azul", "Mochkil", "portal", "code", "data", "chaos", "neon", "matrix",
    "pulse", "echo", "cipher", "void", "maximum", "reality", "quantum", "hacker", "dream", "layer"
  ];

  const body = document.body;
  const width = window.innerWidth;
  const height = window.innerHeight;

  function random(min, max) {
    return Math.random() * (max - min) + min;
  }

  function createWord() {
    const word = document.createElement('div');
    word.className = 'word';
    word.innerText = words[Math.floor(Math.random() * words.length)];
    word.style.left = random(0, width) + 'px';
    word.style.top = random(0, height) + 'px';
    word.style.color = `hsl(${random(0,360)}, 100%, 60%)`;
    body.appendChild(word);

    // Move the word slightly over time
    let dx = random(-0.3, 0.3);
    let dy = random(-0.3, 0.3);

    function animate() {
      const rect = word.getBoundingClientRect();
      let x = rect.left + dx;
      let y = rect.top + dy;

      if (x < 0 || x > width - rect.width) dx *= -1;
      if (y < 0 || y > height - rect.height) dy *= -1;

      word.style.left = x + 'px';
      word.style.top = y + 'px';

      requestAnimationFrame(animate);
    }

    animate();
  }

  // Generate multiple floating words
  for (let i = 0; i < 50; i++) createWord();
</script>
</body>
</html>
