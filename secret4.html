<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Lost in the Void</title>
<style>
  html, body {
    margin:0; padding:0; width:100%; height:100%;
    background: radial-gradient(circle at 50% 50%, #000 0%, #050505 100%);
    overflow: hidden;
    font-family: monospace;
    color: #0ff;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  h1 {
    font-size: 3rem;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
  }
  p {
    font-size: 1rem;
    margin: 8px 0;
    opacity: 0.8;
  }
  a {
    color: #ff00ff;
    text-decoration: none;
    font-weight: bold;
    margin-top: 12px;
  }
  canvas {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    z-index:-1;
  }
  .message {
    position: absolute;
    bottom: 20px;
    font-size: 0.7rem;
    opacity:0.6;
    letter-spacing:1px;
  }
  .secret-link {
    position:absolute;
    width: 50px; height:50px;
    top: 40%; left: 60%;
    cursor:pointer;
    border-radius:50%;
  }
</style>
</head>
<body>
<h1>404</h1>
<p>You’ve wandered off the map…</p>
<a href="https://maximumreality.github.io/art/">Return via Void Bloom</a>

<div class="message" id="dynamicMessage"></div>

<div class="secret-link" id="secretLink" title="Click for a secret"></div>

<canvas id="glitchCanvas"></canvas>

<script>
// ----- Dynamic Messages -----
const messages = [
  "Step lightly…",
  "The library watches.",
  "You’re close… or are you?",
  "Reality has layers.",
  "Find the hidden path.",
  "Beware the glitches."
];
let msgIndex = 0;
const msgEl = document.getElementById('dynamicMessage');
setInterval(() => {
  msgEl.textContent = messages[msgIndex];
  msgIndex = (msgIndex + 1) % messages.length;
}, 4000);

// ----- Secret Link -----
document.getElementById('secretLink').addEventListener('click', () => {
  window.location.href = "https://maximumreality.github.io/art/";
});

// ----- Glitch Canvas -----
const canvas = document.getElementById('glitchCanvas');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

const symbols = [];
for(let i=0; i<100; i++){
  symbols.push({
    x: Math.random()*width,
    y: Math.random()*height,
    char: String.fromCharCode(33 + Math.random()*94),
    speed: 0.5 + Math.random()*1.5
  });
}

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.1)";
  ctx.fillRect(0,0,width,height);
  symbols.forEach(s => {
    ctx.fillStyle = `hsl(${Math.random()*360}, 100%, 50%)`;
    ctx.font = "16px monospace";
    ctx.fillText(s.char, s.x, s.y);
    s.y += s.speed;
    if(s.y>height) s.y = -10;
    s.x += Math.sin(Date.now()/500 + s.y/50);
    if(s.x>width) s.x=0;
  });
  requestAnimationFrame(draw);
}

draw();

window.addEventListener('resize', () => {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
});
</script>
</body>
</html>
