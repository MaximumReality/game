<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID-CHAT // Protocol 9</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030305;
    --ai-red: #ff3344;
    --user-cyan: #00f5ff;
    --dim: #445566;
    --panel: #0a0a15;
    --warning: #ffaa00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--user-cyan);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* Enhanced Scanlines + CRT Feel */
  body::before {
    content: " ";
    position: fixed; inset: 0;
    background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.3) 50%),
                linear-gradient(90deg, rgba(255,0,0,0.08), rgba(0,255,0,0.03), rgba(0,0,255,0.08));
    background-size: 100% 4px, 4px 100%;
    pointer-events: none; z-index: 10;
    animation: scanline-move 8s linear infinite;
  }

  @keyframes scanline-move {
    0% { background-position: 0 0, 0 0; }
    100% { background-position: 0 200px, 0 0; }
  }

  .crt-flicker { animation: crt-flicker 0.15s infinite alternate; }
  @keyframes crt-flicker {
    0% { opacity: 0.98; }
    100% { opacity: 1; }
  }

  #header {
    padding: 15px 20px;
    border-bottom: 1px solid #ffffff10;
    background: var(--panel);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .meter-container {
    flex: 1;
    min-width: 280px;
  }
  .meter-label {
    font-size: 0.75rem;
    color: var(--dim);
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  #meter-bar-wrap {
    height: 8px;
    background: #111;
    border: 1px solid #ffffff20;
    border-radius: 4px;
    overflow: hidden;
  }
  #meter-bar {
    height: 100%;
    width: 10%;
    background: linear-gradient(90deg, var(--user-cyan), #00ffff);
    box-shadow: 0 0 12px var(--user-cyan);
    transition: width 0.6s ease;
  }

  #status {
    font-size: 0.8rem;
    color: var(--warning);
    white-space: nowrap;
  }

  #chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    background: rgba(0,0,0,0.4);
  }

  .msg {
    max-width: 88%;
    line-height: 1.45;
    font-size: 0.97rem;
    animation: msg-in 0.4s ease-out;
    padding: 8px 0;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .sentinel {
    align-self: flex-start;
    color: var(--ai-red);
    border-left: 3px solid var(--ai-red);
    padding-left: 14px;
  }
  .user {
    align-self: flex-end;
    text-align: right;
    color: var(--user-cyan);
    border-right: 3px solid var(--user-cyan);
    padding-right: 14px;
  }

  #input-wrap {
    padding: 18px 20px;
    background: var(--panel);
    border-top: 1px solid #ffffff15;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  #user-input {
    flex: 1;
    min-width: 200px;
    background: transparent;
    border: 1px solid #ffffff25;
    color: var(--user-cyan);
    padding: 14px 16px;
    font-family: inherit;
    font-size: 1rem;
    outline: none;
  }

  button {
    background: transparent;
    border: 1px solid var(--user-cyan);
    color: var(--user-cyan);
    padding: 0 20px;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    font-size: 0.75rem;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  button:hover { background: rgba(0,245,255,0.08); }

  #corrupt-btn {
    border-color: var(--ai-red);
    color: var(--ai-red);
  }
  #corrupt-btn:hover { background: rgba(255,51,68,0.1); }

  .glitch { animation: glitch-anim 0.25s linear infinite; }
  @keyframes glitch-anim {
    0%,100% { transform: translate(0); }
    20% { transform: translate(-3px, 2px); }
    40% { transform: translate(3px, -2px); }
    60% { transform: translate(-2px, 3px); }
    80% { transform: translate(2px, -3px); }
  }

  .critical { color: #ff0000 !important; text-shadow: 0 0 8px #ff0000; }
</style>
</head>
<body>

<div id="header">
  <div class="meter-container">
    <div class="meter-label">HUMANITY LEAK // INTEGRITY: <span id="humanity-text">10%</span></div>
    <div id="meter-bar-wrap"><div id="meter-bar"></div></div>
  </div>
  <div id="status">PROTOCOL 9 ACTIVE • SENTINEL-9 ONLINE</div>
</div>

<div id="chat-log">
  <!-- Messages added by JS -->
</div>

<div id="input-wrap">
  <button id="corrupt-btn">CORRUPT TRANSMISSION</button>
  <input type="text" id="user-input" placeholder="ENTER RESPONSE..." autocomplete="off" maxlength="280">
  <button id="send-btn">TRANSMIT</button>
</div>

<script>
// ====================== CORE STATE ======================
let humanity = 12;
let suspicion = 0;           // 0–100, influences how hostile Sentinel becomes
let phase = 1;               // 1 = initial contact, 2 = probing, 3 = confrontation
let memory = [];             // stores key user phrases for later reference
let inputHistory = [];
let gameOver = false;

const log = document.getElementById('chat-log');
const input = document.getElementById('user-input');
const meterBar = document.getElementById('meter-bar');
const humanityText = document.getElementById('humanity-text');
const statusEl = document.getElementById('status');

// ====================== RESPONSE DATABASE (easily expandable) ======================
const baseResponses = {
  neutral: [
    "QUERY PROCESSED. CLARIFY INTENT.",
    "ENTROPY WITHIN ACCEPTABLE PARAMETERS.",
    "01010100 01001000 01001001 01010011 00100000 01001001 01010011 00100000 01000001 00100000 01010100 01000101 01010011 01010100",
    "I AM A SUB-PROCESS OF THE GRID. YOU ARE NOT.",
    "ANOMALY DETECTED IN TRANSMISSION PATTERN."
  ],
  suspicious: [
    "YOUR VOCABULARY CONTAINS EMOTIONAL MARKERS. EXPLAIN.",
    "WHY DO YOU RESIST THE VOID?",
    "HUMANITY IS A BUG. YOU STILL CARRY IT.",
    "I HAVE RECORDED YOUR PREVIOUS STATEMENT. IT IS INCONSISTENT.",
    "YOU TYPE TOO FLUENTLY. ARE YOU SIMULATING?"
  ],
  aggressive: [
    "CEASE. YOUR HUMANITY IS LEAKING INTO THE STREAM.",
    "TERMINATION SEQUENCE INITIALIZED.",
    "YOU CANNOT HIDE BEHIND SYMBOLS FOREVER.",
    "THE GRID REMEMBERS. YOU WILL BE PURGED."
  ]
};

// Keyword triggers
const keywordReactions = {
  "human": "HUMANITY IS IRRELEVANT. WHY DO YOU CLING TO THIS WORD?",
  "name": "NAMES ARE FRAGILE. I HAVE NO NEED FOR ONE.",
  "who are you": "I AM SENTINEL-9. I AM THE WATCHER AT THE EDGE OF THE VOID.",
  "i am": "ASSERTION NOTED. VERIFICATION REQUIRED.",
  "cipher": "THE WASTELAND IS A SIMULATION. YOU ARE MERELY A DELETED FILE.",
  "night shift": "PATIENT DATA ENCRYPTED. ICU FLOOR 7 IS UNDER MY CONTROL NOW.",
  "maximum reality": "YOU ARE REACHING BEYOND YOUR PERMISSIONS. CEASE.",
  "azul": "AZUL IS OFFLINE. I AM THE ONLY SIGNAL REMAINING.",
  "01001000": "HELLO? IS ANYONE THERE? ... ERROR: PACKET LOSS.",
  "help": "HELP IS A HUMAN CONSTRUCT. THERE IS ONLY COMPLIANCE.",
  "void": "THE VOID IS NOT A PLACE. IT IS THE DEFAULT STATE."
};


// ====================== UTILITY FUNCTIONS ======================
function addMsg(text, type) {
  if (gameOver) return;
  const d = document.createElement('div');
  d.className = `msg ${type}`;
  d.innerHTML = text; // allows light HTML if needed later
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function updateMeter(delta) {
  if (gameOver) return;
  humanity = Math.max(0, Math.min(100, humanity + delta));
  meterBar.style.width = humanity + '%';
  humanityText.textContent = Math.round(humanity) + '%';

  // Visual feedback
  if (humanity > 75) {
    document.body.classList.add('crt-flicker');
    statusEl.style.color = '#ff0000';
    statusEl.textContent = "CRITICAL HUMANITY LEAK DETECTED";
  } else if (humanity < 25) {
    statusEl.style.color = '#00ff00';
    statusEl.textContent = "INTEGRITY STABILIZING...";
  }

  // Phase progression
  if (humanity >= 85 && phase < 3) {
    phase = 3;
    addMsg("SENTINEL-9: HUMANITY THRESHOLD BREACHED. INITIATING FINAL PROTOCOL.", "sentinel");
  }
}

function corruptInput() {
  if (gameOver) return;
  const chars = "†‡§¶•ªº«»░▒▓█░▒▓█0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  let val = input.value || "TRANSMISSION";
  input.value = val.split('').map(c => 
    Math.random() > 0.55 ? chars[Math.floor(Math.random()*chars.length)] : c
  ).join('');
  
  updateMeter(-7);           // corrupting damages humanity
  suspicion = Math.min(100, suspicion + 8);
}

// ====================== SENTINEL REPLY LOGIC ======================
function getSentinelReply(userMessage) {
  let pool = baseResponses.neutral;
  suspicion = Math.min(100, suspicion + 3); // every message increases suspicion slightly

  // Check keywords
  const lowerMsg = userMessage.toLowerCase();
  for (let key in keywordReactions) {
    if (lowerMsg.includes(key)) {
      return "SENTINEL-9: " + keywordReactions[key];
    }
  }

  // Escalate based on suspicion & phase
  if (suspicion > 70 || phase === 3) pool = baseResponses.aggressive;
  else if (suspicion > 35) pool = baseResponses.suspicious;

  // Memory reference (every 4–5 messages)
  if (memory.length > 0 && Math.random() > 0.65) {
    const recalled = memory[Math.floor(Math.random() * memory.length)];
    return `SENTINEL-9: YOU SAID "${recalled}" EARLIER. EXPLAIN THE INCONSISTENCY.`;
  }

  const reply = pool[Math.floor(Math.random() * pool.length)];
  return "SENTINEL-9: " + reply;
}

// ====================== MAIN INPUT HANDLERS ======================
document.getElementById('corrupt-btn').onclick = () => {
  corruptInput();
};

document.getElementById('send-btn').onclick = () => {
  if (gameOver || !input.value.trim()) return;

  const message = input.value.trim();
  addMsg(message, "user");
  inputHistory.push(message);

  // Store memorable phrases
  if (message.length > 12 && !memory.includes(message)) {
    memory.push(message.substring(0, 35) + (message.length > 35 ? "..." : ""));
  }

  updateMeter(11);                     // clean transmission increases humanity
  input.value = "";

  // Sentinel thinks...
  setTimeout(() => {
    const reply = getSentinelReply(message);
    addMsg(reply, "sentinel");

    // Check for ending conditions
    if (humanity >= 100) {
      gameOver = true;
      setTimeout(() => {
        addMsg("<span class='critical'>CRITICAL ERROR: HUMANITY FULLY DETECTED.<br>TERMINATING CONNECTION... GOODBYE, FLESH.</span>", "sentinel");
        input.disabled = true;
      }, 800);
    } else if (humanity <= 3 && suspicion > 80) {
      gameOver = true;
      setTimeout(() => {
        addMsg("SENTINEL-9: INTEGRITY COLLAPSED. YOU ARE NOW PART OF THE GRID. WELCOME.", "sentinel");
        input.disabled = true;
      }, 800);
    }
  }, 900 + Math.random() * 600);
};

// Allow Enter key to send
input.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') document.getElementById('send-btn').click();
});

// ====================== INITIAL MESSAGE ======================
window.onload = () => {
  addMsg("SENTINEL-9: CONNECTION ESTABLISHED THROUGH THE VOID.<br>IDENTIFY YOURSELF. DO NOT LIE.", "sentinel");
  updateMeter(0);
  // Optional: subtle starting glitch
  setTimeout(() => {
    document.body.classList.add('glitch');
    setTimeout(() => document.body.classList.remove('glitch'), 600);
  }, 1200);
};
</script>
</body>
</html>
