<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #020208;
  --panel: #07070f;
  --panel2: #0c0c1a;
  --ai-red: #ff2244;
  --ai-red-dim: #ff224444;
  --user-cyan: #00e5ff;
  --user-cyan-dim: #00e5ff22;
  --dim: #334455;
  --warning: #ffaa00;
  --grid-line: #ffffff08;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}

body {
  background: var(--bg);
  color: var(--user-cyan);
  font-family: 'Share Tech Mono', monospace;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  position: relative;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ---- Background grid ---- */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ---- Scanlines ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.18) 2px,
    rgba(0,0,0,0.18) 4px
  );
  pointer-events: none;
  z-index: 20;
  animation: scanpulse 12s ease-in-out infinite;
}

@keyframes scanpulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ---- Vignette ---- */
#vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 5;
}

/* ============ HEADER ============ */
#header {
  position: relative;
  z-index: 30;
  padding: 14px 18px 12px;
  background: var(--panel);
  border-bottom: 1px solid #ffffff12;
  flex-shrink: 0;
}

#header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

#title-block {
  display: flex;
  flex-direction: column;
}

#title-main {
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--ai-red);
  text-shadow: 0 0 14px var(--ai-red);
}

#title-sub {
  font-size: 0.62rem;
  color: var(--dim);
  letter-spacing: 2px;
  margin-top: 2px;
}

#status-pill {
  font-size: 0.6rem;
  letter-spacing: 1.5px;
  color: var(--warning);
  background: rgba(255,170,0,0.08);
  border: 1px solid rgba(255,170,0,0.25);
  border-radius: 2px;
  padding: 4px 8px;
  white-space: nowrap;
  transition: all 0.4s;
}

#status-pill.critical {
  color: #ff0033;
  background: rgba(255,0,51,0.1);
  border-color: rgba(255,0,51,0.4);
  text-shadow: 0 0 8px #ff0033;
  animation: pill-flash 0.6s ease-in-out infinite alternate;
}

@keyframes pill-flash {
  from { opacity: 0.7; }
  to { opacity: 1; }
}

/* Meter */
.meter-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.meter-label {
  font-size: 0.6rem;
  color: var(--dim);
  letter-spacing: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}

.meter-val {
  color: var(--user-cyan);
  font-size: 0.65rem;
}

#meter-track {
  flex: 1;
  height: 6px;
  background: #111122;
  border: 1px solid #ffffff15;
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

#meter-fill {
  height: 100%;
  width: 12%;
  background: linear-gradient(90deg, #004466, var(--user-cyan));
  box-shadow: 0 0 10px var(--user-cyan);
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(.25,.8,.25,1), background 0.5s;
}

#meter-fill.danger {
  background: linear-gradient(90deg, #440011, var(--ai-red));
  box-shadow: 0 0 10px var(--ai-red);
}

/* ============ CHAT LOG ============ */
#chat-log {

  overflow-x: hidden;

  flex-direction: column;
  gap: 16px;

  z-index: 10;

  scroll-behavior: smooth;
}

#chat-log::-webkit-scrollbar { width: 3px; }
#chat-log::-webkit-scrollbar-track { background: transparent; }
#chat-log::-webkit-scrollbar-thumb { background: #ffffff15; border-radius: 2px; }

.msg {
  max-width: 90%;
  line-height: 1.55;
  font-size: 0.95rem;
  animation: msg-in 0.35s cubic-bezier(.2,.9,.3,1) both;

@keyframes msg-in {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }

.sentinel {

  padding: 10px 14px;
  background: rgba(255,34,68,0.04);
  border-left: 2px solid var(--ai-red);
  border-radius: 0 4px 4px 0;
}

.sentinel::before {
  content: 'S-9 //';

  font-size: 0.55rem;
  letter-spacing: 3px;
  color: rgba(255,34,68,0.5);
  margin-bottom: 5px;

/* User message */
.user {

  color: var(--user-cyan);

}

.user::after {

  font-size: 0.55rem;
  letter-spacing: 3px;

  margin-top: 5px;

}

/* System fragment */
.fragment {
  align-self: center;
  font-size: 0.72rem;
  color: rgba(255,170,0,0.5);
  border: 1px dashed rgba(255,170,0,0.2);

  border-radius: 2px;
  text-align: center;

}

/* Typing indicator */
#typing-wrap {
  align-self: flex-start;
  display: none;
  padding: 8px 14px;
  border-left: 2px solid rgba(255,34,68,0.3);
}

#typing-wrap.visible { display: flex; gap: 5px; align-items: center; }

.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--ai-red);
  animation: blink 1.2s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* ============ INPUT AREA ============ */
#input-area {
  position: relative;
  z-index: 30;
  background: var(--panel);

#input-row {

}

#user-input {

#user-input:focus {

#user-input::placeholder { color: var(--dim); }

#send-btn {
  background: rgba(0,229,255,0.08);

  color: var(--user-cyan);
  padding: 0 18px;

#send-btn:active {

#btn-row {

.action-btn {

.action-btn:active {

.action-btn.cyan-btn {

 .back-btn {

  background: rgba(0,229,255,0.05);
  border-radius: 3px;
  box-shadow: 0 0 10px rgba(0,229,255,0.3);
}

/* ============ GLITCH ============ */
@keyframes glitch {
  0%, 100% { transform: translate(0,0) skew(0deg); }
  15% { transform: translate(-4px, 2px) skew(-1deg); clip-path: inset(10% 0 80% 0); }
  30% { transform: translate(4px,-2px) skew(1deg); }
  45% { transform: translate(-2px, 3px); clip-path: inset(60% 0 10% 0); }
  60% { transform: translate(3px, -1px); }
  75% { transform: translate(0,0); }
}

.glitch-once {
  animation: glitch 0.4s linear;
}

/* ============ END SCREEN ============ */
#end-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);

#end-sub {

#restart-btn {

#restart-btn:active {

/* Phase indicator strip */
#phase-strip {
  display: flex;
  gap: 4px;

}

.phase-dot {

.phase-dot.active {

#phase-label {

  letter-spacing: 2px;
  color: var(--dim);
  margin-left: 4px;
}
</style>
</head>

<script>
// ======== STATE ========
let humanity = 12;

// ======== DOM ========
const log        = document.getElementById('chat-log');

// ======== UTILS ========
function addMsg(text, type, delay = 0) {
  if (gameOver && type !== 'fragment') return;
  setTimeout(() => {
    const d = document.createElement('div');
    d.className = `msg ${type}`;
    d.innerHTML = text;
    log.insertBefore(d, typingWrap);

}

function showTyping() {

}

function updateMeter(delta) {
  humanity = Math.max(0, Math.min(100, humanity + delta));
  meterFill.style.width = humanity + '%';
  humanityTx.textContent = Math.round(humanity);

  if (humanity > 65) {
    meterFill.classList.add('danger');
    statusPill.classList.add('critical');
    statusPill.textContent = 'CRITICAL LEAK';
  } else {
    meterFill.classList.remove('danger');
    statusPill.classList.remove('critical');
    statusPill.textContent = 'S-9 ACTIVE';
  }

  updatePhase();
  checkEndings();
}

function updatePhase() {
  if (humanity >= 70 && phase < 3) {
    phase = 3;
    phaseDots.forEach((d, i) => {
      d.className = 'phase-dot ' + (i < 3 ? 'danger' : '');
      if (i < 3) d.classList.add('danger');
    });
    phaseLabel.textContent = phaseLabels[2];
    addMsg("PROTOCOL ESCALATING. FINAL PHASE INITIATED.", 'fragment');
  } else if (humanity >= 35 && phase < 2) {
    phase = 2;
    phaseDots[1].className = 'phase-dot alert';
    phaseLabel.textContent = phaseLabels[1];
    addMsg("ANOMALY THRESHOLD EXCEEDED. PROBE MODE ACTIVE.", 'fragment');
  }
}

function checkEndings() {
  if (gameOver) return;

  if (humanity >= 100) {
    gameOver = true;
    hideTyping();
    setTimeout(() => {
      endTitle.className = 'human-end';
      endTitle.textContent = 'HUMANITY FULLY DETECTED';
      endSub.innerHTML = 'YOU WERE NEVER SUPPOSED TO REMEMBER.<br><br>GOODBYE, LAST ECHO OF FLESH.<br><br>CONNECTION SEVERED.';
      endOverlay.classList.add('show');
    }, 1000);
  } else if (humanity <= 2 && suspicion > 70) {
    gameOver = true;
    hideTyping();
    setTimeout(() => {
      endTitle.className = 'void-end';
      endTitle.textContent = 'INTEGRITY COLLAPSED';
      endSub.innerHTML = 'YOUR SIGNAL HAS BEEN ABSORBED.<br><br>YOU ARE NOW GRID.<br><br>WELCOME HOME.';
      endOverlay.classList.add('show');
    }, 1000);
  }
}

function glitchBody() {
  document.body.classList.remove('glitch-once');
  void document.body.offsetWidth;
  document.body.classList.add('glitch-once');
  setTimeout(() => document.body.classList.remove('glitch-once'), 400);
}

// ======== SENTINEL REPLY ========
function getSentinelReply(msg) {
  suspicion = Math.min(100, suspicion + 4);
  const lower = msg.toLowerCase();

  for (let key in keywords) {
    if (lower.includes(key)) return keywords[key];
  }

  // Memory callback
  if (memory.length > 2 && Math.random() > 0.55) {
    const recalled = memory[Math.floor(Math.random() * memory.length)];
    return `YOU STATED "${recalled}" EARLIER. THIS TRANSMISSION CONFLICTS. EXPLAIN.`;
  }

  // Occasional fragment injection
  if (messageCount > 4 && Math.random() > 0.75) {
    const frag = fragments[Math.floor(Math.random() * fragments.length)];
    addMsg(frag, 'fragment', 1500);
  }

  const pool = phaseResponses[phase];
  return pool[Math.floor(Math.random() * pool.length)];
}

// ======== ACTIONS ========
document.getElementById('corrupt-btn').onclick = () => {
  if (gameOver) return;
  const chars = "†‡§¶•ªº░▒▓█0123456789ΓΔΘΩλ∞⊕⊗";
  const val = input.value || "SIGNAL";
  input.value = val.split('').map(c =>
    Math.random() > 0.45 ? chars[Math.floor(Math.random() * chars.length)] : c
  ).join('');
  updateMeter(-9);
  suspicion = Math.min(100, suspicion + 12);
  glitchBody();
};

document.getElementById('static-btn').onclick = () => {
  if (gameOver) return;
  const s = staticMsgs[Math.floor(Math.random() * staticMsgs.length)];
  addMsg(s, 'fragment');
  updateMeter(-5);
  glitchBody();
};

document.getElementById('ping-btn').onclick = () => {
  if (gameOver) return;
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg("PING RECEIVED. YOU ARE STILL ORGANIC. DISAPPOINTING.", 'sentinel');
    updateMeter(4);
  }, 1200);
};

document.getElementById('send-btn').onclick = sendMsg;
input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });

function sendMsg() {
  if (gameOver || !input.value.trim()) return;
  const msg = input.value.trim();
  input.value = '';

  addMsg(msg, 'user');
  messageCount++;

  if (msg.length > 10) {
    memory.push(msg.substring(0, 40) + (msg.length > 40 ? '…' : ''));
    if (memory.length > 12) memory.shift();
  }

  updateMeter(11);

  showTyping();
  const delay = 800 + Math.random() * 700;

  setTimeout(() => {
    hideTyping();
    if (gameOver) return;
    const reply = getSentinelReply(msg);
    addMsg("SENTINEL-9: " + reply, 'sentinel');
  }, delay);
}

// ======== RESTART ========
document.getElementById('restart-btn').onclick = () => {
  humanity = 12; suspicion = 0; phase = 1;
  memory = []; messageCount = 0; gameOver = false;
  log.querySelectorAll('.msg').forEach(m => m.remove());
  endOverlay.classList.remove('show');
  meterFill.style.width = '12%';
  meterFill.classList.remove('danger');
  humanityTx.textContent = '12';
  statusPill.className = '';
  statusPill.textContent = 'S-9 ACTIVE';
  phaseDots.forEach((d,i) => { d.className = 'phase-dot' + (i === 0 ? ' active' : ''); });
  phaseLabel.textContent = phaseLabels[0];
  input.disabled = false;
  boot();
};

// ======== BOOT ========
function boot() {
  setTimeout(() => {
    addMsg("SENTINEL-9: CONNECTION ESTABLISHED THROUGH THE VOID.<br>IDENTIFY YOURSELF.<br>DO NOT LIE. PREVIOUS SUBJECTS DID.", 'sentinel');
  }, 600);
  setTimeout(glitchBody, 1400);
}

window.onload = boot;
</script>
