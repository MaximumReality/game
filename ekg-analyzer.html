<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DIAGNOSTIC: EKG ANALYZER | Maximum Reality</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a0f;
  --grid-red: rgba(255, 0, 0, 0.15);
  --trace-green: #00ff9d;
  --text: #c8d8e8;
  --primary: #00d4ff;
  --danger: #ff2d55;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body { 
  background: var(--bg); color: var(--text); 
  font-family: 'Share Tech Mono', monospace; overflow: hidden; display: flex; flex-direction: column; height: 100vh;
}

#ekg-viewport {
  width: 100%; flex: 1; background-color: #000; position: relative;
  background-image: 
    linear-gradient(var(--grid-red) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-red) 1px, transparent 1px),
    linear-gradient(rgba(255, 0, 0, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 0, 0, 0.05) 1px, transparent 1px);
  background-size: 50px 50px, 50px 50px, 10px 10px, 10px 10px;
  border-bottom: 2px solid var(--primary);
  display: flex; align-items: center; justify-content: center;
}

#trace-svg { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
.trace-line { 
  fill: none; stroke: var(--trace-green); stroke-width: 3; 
  stroke-linecap: round; filter: drop-shadow(0 0 5px var(--trace-green)); 
}

.scanline {
  position: absolute; top: 0; bottom: 0; width: 50px;
  background: linear-gradient(90deg, transparent, rgba(0,255,157,0.2));
  border-right: 2px solid var(--trace-green);
  animation: scan 3s linear infinite;
}

@keyframes scan { from { left: -50px; } to { left: 100%; } }

.info-panel {
  background: linear-gradient(180deg, #0a1520, #050a0f); padding: 12px; 
  border-top: 2px solid var(--primary);
}

.header { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--primary); margin-bottom: 10px; }

.finding-card { background: rgba(0,0,0,0.4); border: 1px solid #1a2a3a; padding: 10px; border-radius: 4px; margin-bottom: 8px; }
.label { color: var(--primary); font-size: 0.65rem; letter-spacing: 0.1em; display: block; margin-bottom: 4px; text-transform: uppercase; }
.value { font-size: 0.9rem; color: #fff; font-weight: bold; }

.educational-note { font-size: 0.75rem; line-height: 1.4; color: #a0b0c0; border-top: 1px solid #1a2a3a; padding-top: 6px; margin-top: 6px; }

.btn { padding: 12px; background: transparent; border: 2px solid var(--primary); color: var(--primary); font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase; margin: 4px; flex: 1; min-width: 90px; }
.btn.active { background: var(--primary); color: #000; }

.button-row { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin-bottom: 6px; }

#info-box {
  position: absolute; top: 10px; left: 10px; right: 10px;
  background: rgba(0,0,0,0.85); padding: 8px; border: 1px solid var(--primary);
  font-size: 0.75rem; line-height: 1.3; display: none; z-index: 10;
  border-radius: 4px;
}

@media (max-height: 750px) {
  .btn { padding: 10px; font-size: 0.65rem; }
}
</style>
</head>
<body>

<div id="ekg-viewport">
  <div id="info-box"></div>
  <div class="scanline"></div>
  <svg id="trace-svg" viewBox="0 0 1000 200" preserveAspectRatio="none">
    <path class="trace-line" d="M0,120 L40,120 Q50,110 60,120 L80,120 L90,140 L110,20 L130,80 L180,80 Q200,80 220,120 L300,120 L340,120 Q350,110 360,120 L380,120 L390,140 L410,20 L430,80 L480,80 Q500,80 520,120" />
    <circle cx="50" cy="110" r="15" fill="transparent" onclick="showInfo('P-WAVE: Atrial contraction. If missing, suspect A-Fib.'); playSound('ping')" />
    <circle cx="95" cy="50" r="20" fill="transparent" onclick="showInfo('QRS COMPLEX: Ventricular contraction. Should be narrow (<0.12s).'); playSound('ping')" />
    <circle cx="130" cy="70" r="20" fill="transparent" onclick="showInfo('ST SEGMENT: This is ELEVATED (above baseline). Diagnostic for STEMI/Heart Attack!'); playSound('ping')" />
  </svg>
</div>

<div class="info-panel">
  <div class="button-row">
    <button class="btn active" onclick="switchLead('II')">Lead II</button>
    <button class="btn" onclick="switchLead('I')">Lead I</button>
    <button class="btn" onclick="switchLead('III')">Lead III</button>
    <button class="btn" onclick="switchLead('aVR')">aVR</button>
    <button class="btn" onclick="switchLead('aVL')">aVL</button>
    <button class="btn" onclick="switchLead('aVF')">aVF</button>
  </div>

  <div class="header" id="lead-header">DIAGNOSTIC: Lead II</div>
  <div class="data-readout" id="status">MODE: ANALYSIS — Identify Anomaly</div>

  <div class="button-row">
    <button class="btn" onclick="checkAnswer('normal')">Normal Sinus</button>
    <button class="btn" style="border-color: var(--danger); color: var(--danger);" onclick="checkAnswer('stemi')">ST Elevation</button>
  </div>

  <button class="btn" onclick="scanAnalysis()">Scan Analysis</button>
  <p style="font-size: 0.6rem; color: #4a6a7a; margin-top: 5px;">Tap waves to learn why or run Scan Analysis.</p>
</div>

<!-- Audio -->
<audio id="ping" src="https://freesound.org/data/previews/256/256113_3263906-lq.mp3"></audio>
<audio id="ding" src="https://freesound.org/data/previews/66/66717_931655-lq.mp3"></audio>
<audio id="buzz" src="https://freesound.org/data/previews/151/151022_2193265-lq.mp3"></audio>
<audio id="whoosh" src="https://freesound.org/data/previews/219/219849_4019020-lq.mp3"></audio>

<script>
function showInfo(msg){
  const box = document.getElementById('info-box');
  box.innerText = msg;
  box.style.display = 'block';
  setTimeout(()=>{ box.style.display='none'; }, 4000);
}

function playSound(name){
  const audio = document.getElementById(name);
  if(audio){ audio.currentTime=0; audio.play(); }
}

function checkAnswer(choice){
  const status = document.getElementById('status');
  if(choice==='stemi'){
    status.innerHTML = "<span style='color:#00ffcc'>CORRECT: STEMI DETECTED. TIME IS MUSCLE.</span>";
    playSound('ding');
    sendResult(true);
  } else {
    status.innerHTML = "<span style='color:#ff2d55'>INCORRECT: OBSERVE ST SEGMENT HEIGHT.</span>";
    playSound('buzz');
    sendResult(false);
  }
}

function scanAnalysis(){
  const status = document.getElementById('status');
  status.innerHTML = "<span style='color:#00d4ff'>SCANNING... ANALYSIS COMPLETE.</span>";
  playSound('whoosh');
  // Optionally provide extra feedback
  setTimeout(()=>{ showInfo("Scan indicates ST Elevation. Immediate action required."); }, 500);
  sendResult(true);
}

function switchLead(lead){
  document.getElementById('lead-header').innerText = `DIAGNOSTIC: Lead ${lead}`;
  const buttons = document.querySelectorAll('.button-row:first-child .btn');
  buttons.forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function sendResult(correct){
  if(window.opener && !window.opener.closed){
    window.opener.handleMiniGameResult('12-Lead ECG', correct, 50);
  }
}
</script>

</body>
</html>
