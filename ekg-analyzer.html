<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DIAGNOSTIC: 12‑Lead ECG ANALYZER | Maximum Reality</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050a0f;
  --grid-major: rgba(0,212,255,0.3);
  --grid-minor: rgba(0,212,255,0.1);
  --trace-green: #00ff9d;
  --primary: #00d4ff;
  --danger: #ff2d55;
  --text: #c8d8e8;
}
* { box-sizing: border-box; margin:0; padding:0; }
body {
  background: var(--bg); color: var(--text);
  font-family:'Share Tech Mono',monospace; overflow:hidden; height:100vh;
  display:flex;flex-direction:column;
}
#ekg-viewport {
  flex:1; position:relative; background:#000; border-bottom:2px solid var(--primary);
  background-image:
    linear-gradient(var(--grid-minor) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-minor) 1px,transparent 1px),
    linear-gradient(var(--grid-major) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-major) 1px,transparent 1px);
  background-size:10px 10px,10px 10px,50px 50px,50px 50px;
}
svg { width:100%; height:200px; filter:drop-shadow(0 0 8px var(--trace-green)); }
.ekg-path { fill:none; stroke:var(--trace-green); stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
.scanline {
  position:absolute;top:0;bottom:0;width:50px;
  background:linear-gradient(90deg,transparent,rgba(0,255,157,0.2));
  border-right:2px solid var(--trace-green);
  animation:scan 3s linear infinite;
}
@keyframes scan{from{left:-50px;}to{left:100%;}}
#info-box {
  position:absolute;top:10px;left:10px;right:10px;
  background:rgba(0,0,0,0.85);padding:8px;border:1px solid var(--primary);
  font-size:0.75rem;line-height:1.4;display:none;z-index:10;border-radius:4px;
}

/* PANEL */
.ui-panel{background:rgba(15,21,32,0.95);padding:10px;text-align:center;}
.button-row{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:6px;}
.btn{background:transparent;border:1px solid var(--primary);color:var(--primary);padding:8px 12px;cursor:pointer;text-transform:uppercase;font-family:'Orbitron';font-size:0.7rem;transition:0.2s;}
.btn.active{background:var(--primary);color:#000;}
.btn.danger{border-color:var(--danger);color:var(--danger);}
.header{font-family:'Orbitron',sans-serif;font-size:0.9rem;color:var(--primary);margin-bottom:4px;}
.data-readout{font-size:0.8rem;color:var(--text);margin-bottom:6px;}
</style>
</head>
<body>

<!-- Sounds -->
<audio id="ping-sound" src="https://freesound.org/data/previews/256/256113_3263906-lq.mp3"></audio>
<audio id="ding-sound" src="https://freesound.org/data/previews/66/66717_931655-lq.mp3"></audio>
<audio id="buzz-sound" src="https://freesound.org/data/previews/151/151022_2193265-lq.mp3"></audio>
<audio id="whoosh-sound" src="https://freesound.org/data/previews/219/219849_4019020-lq.mp3"></audio>

<div id="ekg-viewport">
  <div id="info-box"></div>
  <div class="scanline"></div>
  <svg viewBox="0 0 500 200">
    <path id="ekg-path" class="ekg-path"></path>

    <!-- Tap zones for segments -->
    <circle cx="60" cy="110" r="15" fill="transparent" onclick="tapSegment('P')"></circle>
    <circle cx="130" cy="50" r="20" fill="transparent" onclick="tapSegment('QRS')"></circle>
    <circle cx="200" cy="80" r="20" fill="transparent" onclick="tapSegment('ST')"></circle>
  </svg>
</div>

<div class="ui-panel">
  <div class="button-row">
    <button class="btn active" onclick="switchLead('I')">Lead I</button>
    <button class="btn" onclick="switchLead('II')">Lead II</button>
    <button class="btn" onclick="switchLead('III')">Lead III</button>
    <button class="btn" onclick="switchLead('aVR')">aVR</button>
    <button class="btn" onclick="switchLead('aVL')">aVL</button>
    <button class="btn" onclick="switchLead('aVF')">aVF</button>
  </div>

  <div class="header" id="lead-header">DIAGNOSTIC: Lead I</div>
  <div class="data-readout" id="status">MODE: ANALYSIS — Identify Anomaly</div>

  <div class="button-row">
    <button class="btn" onclick="checkAnswer('normal')">Normal Sinus</button>
    <button class="btn danger" onclick="checkAnswer('stemi')">ST Elevation</button>
  </div>

  <button class="btn" onclick="scanAnalysis()">Scan Analysis</button>
  <p style="font-size:0.6rem;color:#4a6a7a;margin-top:5px;">Tap waves to learn why or run Scan Analysis.</p>
</div>

<script>
// Preload sounds
const ping = document.getElementById('ping-sound');
const ding = document.getElementById('ding-sound');
const buzz = document.getElementById('buzz-sound');
const whoosh = document.getElementById('whoosh-sound');

// Define real ECG paths + segment explanations per lead
const leadData = {
  'I': {
    path: "M0,100 L40,100 Q50,90 60,100 L80,100 L90,110 L110,60 L140,100 L180,90 L220,100 L500,100",
    rhythm: "Normal Sinus Rhythm",
    explain: {
      'P': "Lead I P‑wave is upright — indicates normal atrial depolarization.",
      'QRS': "Lead I QRS is narrow — consistent with normal ventricular conduction.",
      'ST': "Lead I ST segment is isoelectric — no ischemia in this lead."
    }
  },
  'II': {
    path: "M0,100 L40,100 Q50,80 60,100 L80,100 L85,120 L95,20 L105,120 L110,70 L150,70 Q170,50 190,70 L250,70 L290,100 L500,100",
    rhythm: "ST‑Elevated MI (Inferior)",
    explain: {
      'P': "Lead II P‑wave may be normal or peaked — check atrial activity.",
      'QRS': "Lead II QRS shows tall R’s — consistent with inferior lead pattern.",
      'ST': "Lead II ST elevation is present — classic sign of inferior STEMI."
    }
  },
  'III': {
    path: "M0,100 L40,100 Q50,85 60,100 L80,100 L90,110 L100,60 L110,100 L150,100 L200,120 L500,100",
    rhythm: "Inferior MI Pattern (Lead III)",
    explain: {
      'P': "Lead III P is present but small — atrial depolarization appears normal.",
      'QRS': "Lead III QRS may show slight abnormality with inferior involvement.",
      'ST': "Lead III ST elevation present — supports inferior MI diagnosis."
    }
  },
  'aVR': {
    path: "M0,100 L60,100 Q70,90 80,100 L120,100 L130,120 L140,80 L180,100 L220,100 L500,100",
    rhythm: "aVR Reciprocal ST Change",
    explain: {
      'P': "Lead aVR P may be inverted — normal for aVR orientation.",
      'QRS': "Lead aVR QRS often inverted due to vector orientation.",
      'ST': "Lead aVR ST elevation can indicate global ischemia or left main CAD."
    }
  },
  'aVL': {
    path: "M0,100 L50,100 Q60,80 70,100 L90,100 L100,130 L120,70 L160,100 L200,100 L500,100",
    rhythm: "Lateral Lead Pattern (aVL)",
    explain: {
      'P': "Lead aVL P is upright — normal atrial depolarization.",
      'QRS': "Lead aVL QRS shows slight variance — check lateral wall conduction.",
      'ST': "Lead aVL ST depression may indicate reciprocal change in lateral MI."
    }
  },
  'aVF': {
    path: "M0,100 L40,100 Q50,90 60,100 L80,100 L85,130 L95,50 L110,100 L150,100 L500,100",
    rhythm: "Inferior Lead (aVF)",
    explain: {
      'P': "Lead aVF P identifiable — atrial activity visible.",
      'QRS': "Lead aVF QRS has abnormal morphology — consistent with inferior involvement.",
      'ST': "Lead aVF ST elevation supports inferior MI in multiple leads."
    }
  }
};

let currentLead = 'I';

function switchLead(lead){
  currentLead = lead;
  document.getElementById('ekg-path').setAttribute('d', leadData[lead].path);
  document.getElementById('lead-header').innerText = "DIAGNOSTIC: " + lead;
  document.getElementById('status').innerText = "MODE: ANALYSIS — Identify Anomaly";
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  whoosh.play();
}

function tapSegment(seg){
  const msg = leadData[currentLead].explain[seg];
  const box = document.getElementById('info-box');
  box.innerText = msg;
  box.style.display = 'block';
  ping.play();
  setTimeout(()=>{ box.style.display='none'; },4000);
}

function checkAnswer(choice){
  const status = document.getElementById('status');
  const correct = (currentLead==='II' && choice==='stemi') || (currentLead!=='II' && choice==='normal');
  if(correct){
    status.innerHTML = "<span style='color:#00ffcc'>CORRECT: " + leadData[currentLead].rhythm + "</span>";
    ding.play();
    if(window.opener && !window.opener.closed){
      window.opener.handleMiniGameResult('12-Lead ECG', true, 50);
    }
    setTimeout(()=>{ window.close(); },1000);
  } else {
    status.innerHTML = "<span style='color:#ff2d55'>INCORRECT — analyze ST segment carefully.</span>";
    buzz.play();
  }
}

function scanAnalysis(){
  const status = document.getElementById('status');
  status.innerHTML = "<span style='color:#00d4ff'>SCAN ANALYSIS: " + leadData[currentLead].rhythm + "</span>";
  whoosh.play();
}

// Initialize
switchLead('I');
</script>

</body>
</html>
