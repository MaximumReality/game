<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Portal — Maximum Reality</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #000 0%, #111 100%);
    font-family: monospace;
    color: #0ff;
    overflow: hidden;
    cursor: crosshair;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
  }

  h1 {
    font-size: 5rem;
    color: #f0f;
    text-shadow: 0 0 10px #f0f, 0 0 20px #0ff, 0 0 30px #ff0;
    animation: glitch 1.5s infinite;
  }

  p {
    max-width: 400px;
    opacity: 0.8;
    line-height: 1.4;
  }

  .floating-symbol {
    position: absolute;
    font-size: 2rem;
    color: #ff0;
    opacity: 0.6;
    pointer-events: none;
    animation: float 4s ease-in-out infinite;
  }

  @keyframes glitch {
    0% { transform: translate(0); text-shadow: 2px 0 #f0f, -2px 2px #0ff; }
    25% { transform: translate(-2px,2px); text-shadow: -2px -2px #f0f, 2px 2px #0ff; }
    50% { transform: translate(2px,-2px); text-shadow: 2px 2px #f0f, -2px -2px #0ff; }
    75% { transform: translate(-2px,-1px); text-shadow: -2px 0 #f0f, 2px -2px #0ff; }
    100% { transform: translate(1px,2px); text-shadow: 2px -2px #f0f, -2px 0 #0ff; }
  }

  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-30px) rotate(180deg); }
  }

  button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 12px;
    border: 1px solid #ff0;
    background: transparent;
    color: #ff0;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #ff0;
    color: #000;
  }

</style>
</head>
<body>

<h1>⚡ Portal Found ⚡</h1>
<p>You’ve wandered into a hidden fragment of Maximum Reality. Click around—things might move… or disappear… or shift entirely.</p>
<button onclick="window.location.href='404.html'">Back to the Labyrinth</button>

<script>
  const symbols = ['✦','✧','⚡','☄','✺','⍟'];
  function spawnSymbol() {
    const sym = document.createElement('div');
    sym.className = 'floating-symbol';
    sym.innerText = symbols[Math.floor(Math.random() * symbols.length)];
    sym.style.left = Math.random() * 100 + 'vw';
    sym.style.top = Math.random() * 100 + 'vh';
    sym.style.fontSize = (16 + Math.random()*48) + 'px';
    document.body.appendChild(sym);
    setTimeout(()=>{ sym.remove() }, 5000);
  }
  setInterval(spawnSymbol, 300);

  // Click anywhere for a random glitch effect
  document.body.addEventListener('click', ()=>{
    document.body.style.background = `radial-gradient(circle at center, #000 0%, #${Math.floor(Math.random()*16777215).toString(16)} 100%)`;
  });
</script>

</body>
</html>
