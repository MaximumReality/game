        :root {
            --neon-green: #39ff14;

        }

        body {
    background-color: var(--dark-bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh; /* better for mobile */
    margin: 0;
    font-family: 'Courier New', Courier, monospace;
    color: white;
    overflow: hidden;
}

/* Arcade Cabinet */
#arcade-cabinet {
    position: relative;
    width: 95vw;
    max-width: 520px;
    height: 90dvh; /* slightly smaller so it fits */
    background: #111;
    border: 6px solid #333;
    border-radius: 20px;
    box-shadow: 0 0 30px var(--neon-pink);
    display: flex;
    flex-direction: column;
}

        #arcade-header {
    height: 40px;
    background: #000;
    border-bottom: 2px solid var(--neon-blue);
    color: var(--neon-green);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
    font-size: 0.7rem;
    letter-spacing: 1px;
}

.blink {
    color: #ff0033;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.2; }
}

        /* Screen Area */
        #screen-container {
            position: relative;
            flex: 1;
            background: var(--retro-purple);
            margin: 10px;
            border: 4px solid #222;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* CRT Scanline Effect */
        #screen-container::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 5;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        /* UI Styling */
        #ui-layer {
            flex: 1;
            padding: 10px;
            text-align: center;
            z-index: 10;
        }

        #question-display {
            font-size: 1.1rem;
            color: var(--neon-green);
            text-shadow: 2px 2px #000;
            margin-bottom: 15px;
            min-height: 60px;
        }

        #options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .arcade-btn {
            background: #333;
            color: white;
            border: 3px solid #555;
            padding: 10px 5px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 3px 3px 0px #000;
            transition: 0.1s;
        }

        .arcade-btn:hover { background: #444; border-color: var(--neon-blue); }
        .arcade-btn:active { transform: translate(2px, 2px); box-shadow: none; background: var(--neon-green); color: black; }

        /* Rationale Overlay */
        #rationale-overlay {
            display: none;
            position: absolute;
            top: 10%; left: 5%;
            width: 80%;
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid var(--neon-pink);
            padding: 20px;
            z-index: 100;
            color: white;
        }

        .continue-btn {
            width: 100%;
            margin-top: 15px;
            background: var(--neon-green) !important;
            color: black !important;
        }

        #score-counter {
            position: absolute;
            top: 45px; right: 10px;
            color: var(--neon-blue);
            font-weight: bold;
            z-index: 20;
        }

     #footer-nav {
    position: fixed;
    bottom: 60px; /* 👈 adjust this number freely now */
    left: 50%;
    transform: translateX(-50%);

    gap: 10px;

.nav-btn {

.nav-btn:hover {
    background: var(--neon-blue);
    color: black;
}

.nav-btn:active {
    transform: translate(2px,2px);
    box-shadow: none;
}

    function initGame() {
        score = 0;
        scoreEl.innerText = `XP: 0/20`;
        nextQuestion();
    }

    function nextQuestion() {
        if (score >= 20) {
            victory();
            return;
        }

        currentQA = nclexData[Math.floor(Math.random() * nclexData.length)];
        questionEl.innerText = currentQA.q;
        
        let choices = [...currentQA.wrong, currentQA.a];
        choices.sort(() => Math.random() - 0.5);

        optionsEl.innerHTML = '';
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice;
            btn.className = "arcade-btn";
            btn.onclick = () => checkAnswer(choice);
            optionsEl.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 100;
        timerInterval = setInterval(() => {
            timeLeft -= (100 / (TIME_LIMIT * 10));
            drawGame();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                checkAnswer("TIMEOUT");
            }
        }, 100);
    }

    function checkAnswer(choice) {
        clearInterval(timerInterval);
        const isCorrect = (choice === currentQA.a);
        const resText = document.getElementById('result-text');
        const ratText = document.getElementById('rationale-text');

        if (isCorrect) {
            score++;
            scoreEl.innerText = `XP: ${score}/20`;
            resText.innerText = "CRITICAL HIT! +1 XP";
            resText.style.color = "var(--neon-green)";
        } else {
            resText.innerText = choice === "TIMEOUT" ? "TIME EXPIRED!" : "SYSTEM ERROR!";
            resText.style.color = "#ff0033";
        }

        ratText.innerText = currentQA.rationale;
        overlay.style.display = "block";
    }

    function closeRationale() {
        overlay.style.display = "none";
        nextQuestion();
    }

    function drawGame() {
        ctx.fillStyle = '#2b0040';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Floor
        ctx.fillStyle = '#00ffff';
        ctx.fillRect(0, 250, canvas.width, 50);

        // Timer Bar
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 4;
        ctx.strokeRect(50, 20, 500, 30);
        
        let barColor = "#39ff14";
        if (timeLeft < 50) barColor = "#ffff00";
        if (timeLeft < 25) barColor = "#ff0033";
        
        ctx.fillStyle = barColor;
        ctx.fillRect(54, 24, (timeLeft / 100) * 492, 22);
    }

    function victory() {
    winSound.currentTime = 0;
    winSound.play().catch(() => {});
    clearInterval(timerInterval);
    questionEl.innerText = "";
    optionsEl.innerHTML = "<button class='arcade-btn continue-btn' onclick='initGame()'>RESTART</button>";

    ctx.fillStyle = "#39ff14";
    ctx.font = "bold 50px Courier New";
    ctx.textAlign = "center";
    
    // Neon glow
    ctx.shadowColor = "#00ffff";
    ctx.shadowBlur = 20;

    ctx.fillText("LEVEL", canvas.width / 2, 130);
    ctx.fillText("COMPLETE", canvas.width / 2, 190);
    ctx.fillText("INSERT COIN", canvas.width / 2, 260); // <-- add this on the screen

    // Optional: flicker effect
    setInterval(() => {
        ctx.clearRect(0, 240, canvas.width, 60);
        if (Math.random() > 0.5) {
            ctx.fillText("INSERT COIN", canvas.width / 2, 260);
        }
    }, 300);
}
    initGame();

    if (!hasStarted) {
    startSound.currentTime = 0;
    startSound.play().catch(()=>{});
    hasStarted = true;
}
},

    function playExit(e, url) {
    e.preventDefault();

    exitSound.currentTime = 0;
    exitSound.play().catch(()=>{});

    // small delay so sound plays before navigation
    setTimeout(() => {
        window.location.href = url;
    }, 300);
}
