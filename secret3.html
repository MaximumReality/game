<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch Garden | Maximum Reality</title>
<link rel="icon" href="https://maximumreality.xyz/logo.png">

<style>
  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%);
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #fff;
  }

  h1 {
    text-align: center;
    margin-top: 40px;
    font-size: 2rem;
    color: #00ffcc;
    text-shadow: 0 0 15px #00ffcc, 0 0 30px #00ffcc;
  }

  .symbol {
    position: absolute;
    font-size: calc(0.8rem + 1vw);
    cursor: pointer;
    transition: transform 0.2s ease, opacity 0.2s ease;
    user-select: none;
  }

  .symbol:hover {
    transform: scale(1.5) rotate(20deg);
    color: #ff00ff;
    text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
  }

  .link-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 18px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 0.85rem;
    color: #00ffcc;
    border: 1px solid #00ffcc;
    background: rgba(0,0,0,0.5);
    text-decoration: none;
    text-align: center;
    box-shadow: 0 0 10px #00ffcc;
    transition: all 0.2s ease;
  }

  .link-btn:hover {
    background: rgba(0,255,204,0.2);
    transform: translateX(-50%) scale(1.05);
  }
</style>
</head>

<body>
<h1>🌱 Glitch Garden</h1>

<a href="https://maximumreality.github.io/art/" class="link-btn">Enter Void Bloom →</a>

<script>
  const symbols = ["★", "✦", "☽", "☀", "☁", "❂", "✺", "☯", "☾", "❉", "✶", "⚡"];
  const body = document.body;
  const width = window.innerWidth;
  const height = window.innerHeight;

  function random(min, max) {
    return Math.random() * (max - min) + min;
  }

  function createSymbol() {
    const symbol = document.createElement('div');
    symbol.className = 'symbol';
    symbol.innerText = symbols[Math.floor(Math.random() * symbols.length)];
    symbol.style.left = random(0, width) + 'px';
    symbol.style.top = random(0, height) + 'px';
    symbol.style.color = `hsl(${random(0,360)}, 100%, 70%)`;
    body.appendChild(symbol);

    let dx = random(-0.2, 0.2);
    let dy = random(-0.2, 0.2);

    function animate() {
      const rect = symbol.getBoundingClientRect();
      let x = rect.left + dx;
      let y = rect.top + dy;

      if (x < 0 || x > width - rect.width) dx *= -1;
      if (y < 0 || y > height - rect.height) dy *= -1;

      symbol.style.left = x + 'px';
      symbol.style.top = y + 'px';

      requestAnimationFrame(animate);
    }

    animate();

    symbol.addEventListener('click', () => {
      for (let i = 0; i < 6; i++) {
        const spark = document.createElement('div');
        spark.innerText = symbols[Math.floor(Math.random() * symbols.length)];
        spark.style.position = 'absolute';
        spark.style.left = symbol.offsetLeft + 'px';
        spark.style.top = symbol.offsetTop + 'px';
        spark.style.color = `hsl(${random(0,360)}, 100%, 80%)`;
        spark.style.fontSize = '1rem';
        spark.style.opacity = 1;
        body.appendChild(spark);

        let sx = random(-3, 3);
        let sy = random(-3, 3);

        function sparkAnim() {
          const left = parseFloat(spark.style.left);
          const top = parseFloat(spark.style.top);
          spark.style.left = left + sx + 'px';
          spark.style.top = top + sy + 'px';
          spark.style.opacity -= 0.03;
          if (spark.style.opacity > 0) requestAnimationFrame(sparkAnim);
          else body.removeChild(spark);
        }

        sparkAnim();
      }
    });
  }

  for (let i = 0; i < 40; i++) createSymbol();
</script>
</body>
</html>
