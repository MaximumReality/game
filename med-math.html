<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DIAGNOSTIC: MED-MATH LAB | Maximum Reality</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --pump-bg: #121826; --screen-bg: #002b36; --led-green: #00ff9d;
  --primary: #00d4ff; --danger: #ff2d55; --text: #c8d8e8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: #060810; color: var(--text); 
  font-family: 'Share Tech Mono', monospace; display: flex; flex-direction: column; height: 100vh;
}
.order-panel {
  padding: 15px; background: rgba(0,212,255,0.05); border-bottom: 2px solid var(--primary);
}
.order-header { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--primary); margin-bottom: 8px; }
.order-text { background: #000; padding: 12px; border-left: 3px solid var(--primary); font-size: 0.9rem; line-height: 1.4; }
.pump-interface {
  flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.pump-body {
  background: var(--pump-bg); border: 4px solid #2a3a4a; border-radius: 15px; width: 100%; max-width: 340px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.pump-screen {
  background: var(--screen-bg); height: 100px; border-radius: 5px; margin-bottom: 20px;
  border: 2px solid #004d5d; padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center;
}
.screen-label { font-size: 0.6rem; color: var(--primary); letter-spacing: 0.1em; margin-bottom: 5px; }
.screen-value { font-family: 'Orbitron'; font-size: 2rem; color: var(--led-green); text-shadow: 0 0 10px var(--led-green); }
.keypad {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.key {
  background: #1e2a3a; border: 1px solid #3a4a5a; color: #fff; padding: 15px;
  font-family: 'Orbitron'; font-size: 1.2rem; cursor: pointer; border-radius: 5px;
}
.key:active { background: var(--primary); color: #000; }
.key.clear { color: var(--danger); font-size: 0.8rem; }
.key.enter { grid-column: span 3; background: var(--primary); color: #000; font-size: 0.9rem; }
#result-msg { margin-top: 15px; text-align: center; font-size: 0.8rem; min-height: 1em; }
@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
  100% { transform: translateX(0); }
}
</style>
</head>
<body>

<!-- Audio -->
<audio id="ping-sound" src="https://freesound.org/data/previews/256/256113_3263906-lq.mp3"></audio>
<audio id="ding-sound" src="https://freesound.org/data/previews/66/66717_931655-lq.mp3"></audio>
<audio id="buzz-sound" src="https://freesound.org/data/previews/151/151022_2193265-lq.mp3"></audio>

<div class="order-panel">
  <div class="order-header">◈ PHYSICIAN'S ORDER</div>
  <div class="order-text" id="order-text">
    <!-- Dynamic order will appear here -->
  </div>
</div>

<div class="pump-interface">
  <div class="pump-body">
    <div class="pump-screen">
      <div class="screen-label">RATE (mL/hr)</div>
      <div class="screen-value" id="display">0</div>
    </div>
    
    <div class="keypad">
      <button class="key" onclick="press(7)">7</button>
      <button class="key" onclick="press(8)">8</button>
      <button class="key" onclick="press(9)">9</button>
      <button class="key" onclick="press(4)">4</button>
      <button class="key" onclick="press(5)">5</button>
      <button class="key" onclick="press(6)">6</button>
      <button class="key" onclick="press(1)">1</button>
      <button class="key" onclick="press(2)">2</button>
      <button class="key" onclick="press(3)">3</button>
      <button class="key clear" onclick="clearDisplay()">CLR</button>
      <button class="key" onclick="press(0)">0</button>
      <button class="key" onclick="press('.')">.</button>
      <button class="key enter" onclick="checkMath()">START INFUSION</button>
    </div>
    <div id="result-msg"></div>
  </div>
</div>

<script>
// Audio references
const pingSound = document.getElementById('ping-sound');
const dingSound = document.getElementById('ding-sound');
const buzzSound = document.getElementById('buzz-sound');

let currentInput = "";
let correctValue = 0;

// Example patients and orders
const patients = [
  { name: "Derek Phan", volume: 1000, time: 8 },
  { name: "Lila Tran", volume: 500, time: 4 },
  { name: "Marcus Lee", volume: 750, time: 6 },
  { name: "Sofia Kim", volume: 1200, time: 12 }
];

function newOrder() {
  const order = patients[Math.floor(Math.random() * patients.length)];
  correctValue = order.volume / order.time;
  document.getElementById('order-text').innerHTML =
    `<strong>PATIENT:</strong> ${order.name}<br>
     <strong>ORDER:</strong> ${order.volume} mL Normal Saline IV<br>
     <strong>INFUSE OVER:</strong> ${order.time} hours<br>
     <span style="color:var(--primary)">TASK: Calculate the Flow Rate (mL/hr)</span>`;
  currentInput = "";
  document.getElementById('display').innerText = "0";
  document.getElementById('result-msg').innerText = "";
}

// Keypad functions
function press(num) {
  pingSound.play();
  if (currentInput === "" && num === 0) return;
  if (currentInput.length < 6) {
    currentInput += num;
    document.getElementById('display').innerText = currentInput;
  }
}

function clearDisplay() {
  currentInput = "";
  document.getElementById('display').innerText = "0";
  document.getElementById('result-msg').innerText = "";
}

function checkMath() {
  const val = parseFloat(currentInput);
  const msg = document.getElementById('result-msg');
  const display = document.getElementById('display');
  
  if (val === correctValue) {
    msg.style.color = "var(--led-green)";
    msg.innerText = "✓ CORRECT: INFUSION STARTED";
    display.style.color = "var(--led-green)";
    dingSound.play();
    
    if (window.opener && !window.opener.closed) {
      window.opener.handleMiniGameResult('IV Pump', true, 50);
    }
    
    setTimeout(() => { window.close(); }, 1500);

  } else {
    msg.style.color = "var(--danger)";
    msg.innerText = "✗ CALC ERROR: RE-CHECK DOSAGE";
    display.style.color = "var(--danger)";
    buzzSound.play();
    
    const body = document.querySelector('.pump-body');
    body.style.animation = "shake 0.2s ease-in-out 0s 2";
    setTimeout(() => {
      display.style.color = "var(--led-green)";
      body.style.animation = "";
    }, 500);
  }
}

// Initialize first order
newOrder();
</script>

</body>
</html>
