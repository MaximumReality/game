<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>VOID-CHAT // Protocol 9</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030305;
    --ai-red: #ff3344;
    --user-cyan: #00f5ff;
    --dim: #445566;
    --panel: #0a0a15;
    --warning: #ffaa00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--user-cyan);
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  body::before {
    content: " ";
    position: fixed; inset: 0;
    background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.3) 50%),
                linear-gradient(90deg, rgba(255,0,0,0.08), rgba(0,255,0,0.03), rgba(0,0,255,0.08));
    background-size: 100% 4px, 4px 100%;
    pointer-events: none; z-index: 10;
    animation: scanline-move 8s linear infinite;
  }

  @keyframes scanline-move { 0% { background-position: 0 0, 0 0; } 100% { background-position: 0 200px, 0 0; } }

  .crt-flicker { animation: crt-flicker 0.15s infinite alternate; }
  @keyframes crt-flicker { 0% { opacity: 0.98; } 100% { opacity: 1; } }

  #header {
    padding: 16px 20px;
    border-bottom: 1px solid #ffffff10;
    background: var(--panel);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .meter-container { flex: 1; min-width: 260px; }
  .meter-label { font-size: 0.82rem; color: var(--dim); letter-spacing: 3px; margin-bottom: 7px; }
  #meter-bar-wrap { height: 9px; background: #111; border: 1px solid #ffffff20; border-radius: 4px; overflow: hidden; }
  #meter-bar { height: 100%; width: 12%; background: linear-gradient(90deg, var(--user-cyan), #00ffff); box-shadow: 0 0 12px var(--user-cyan); transition: width 0.6s ease; }

  #status { font-size: 0.85rem; color: var(--warning); white-space: nowrap; }

  #chat-log {
    flex: 1;
    overflow-y: auto;
    padding: 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    background: rgba(0,0,0,0.45);
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: 88%;
    line-height: 1.5;
    font-size: 1.05rem;
    animation: msg-in 0.4s ease-out;
    padding: 9px 0;
  }
  @keyframes msg-in { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

  .sentinel { align-self: flex-start; color: var(--ai-red); border-left: 3px solid var(--ai-red); padding-left: 15px; }
  .user { align-self: flex-end; text-align: right; color: var(--user-cyan); border-right: 3px solid var(--user-cyan); padding-right: 15px; }

  #input-wrap {
    padding: 18px 20px;
    background: var(--panel);
    border-top: 1px solid #ffffff15;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  #user-input {
    flex: 1;
    min-width: 200px;
    background: transparent;
    border: 1px solid #ffffff30;
    color: var(--user-cyan);
    padding: 16px 18px;
    font-family: inherit;
    font-size: 1.1rem;
    outline: none;
    border-radius: 4px;
  }

  button {
    background: transparent;
    border: 1.5px solid var(--user-cyan);
    color: var(--user-cyan);
    padding: 0 22px;
    font-family: inherit;
    text-transform: uppercase;
    font-size: 0.82rem;
    letter-spacing: 1.5px;
    min-height: 52px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  button:hover, button:active { background: rgba(0,245,255,0.12); }

  #corrupt-btn { border-color: var(--ai-red); color: var(--ai-red); min-width: 140px; }
  #corrupt-btn:hover, #corrupt-btn:active { background: rgba(255,51,68,0.12); }

  .glitch { animation: glitch-anim 0.25s linear infinite; }
  @keyframes glitch-anim {
    0%,100% { transform: translate(0); }
    20% { transform: translate(-3px, 2px); }
    40% { transform: translate(3px, -2px); }
    60% { transform: translate(-2px, 3px); }
    80% { transform: translate(2px, -3px); }
  }

  .critical { color: #ff0000 !important; text-shadow: 0 0 10px #ff0000; }
  .log-fragment { font-size: 0.9rem; color: #ffaa0088; border-left: 2px dashed #ffaa0088; padding-left: 12px; }
</style>
</head>
<body>

<div id="header">
  <div class="meter-container">
    <div class="meter-label">HUMANITY LEAK // INTEGRITY: <span id="humanity-text">12%</span></div>
    <div id="meter-bar-wrap"><div id="meter-bar"></div></div>
  </div>
  <div id="status">PROTOCOL 9 ACTIVE • SENTINEL-9 ONLINE</div>
</div>

<div id="chat-log"></div>

<div id="input-wrap">
  <button id="corrupt-btn">CORRUPT TRANSMISSION</button>
  <input type="text" id="user-input" placeholder="ENTER RESPONSE..." autocomplete="off" maxlength="300">
  <button id="send-btn">TRANSMIT</button>
</div>

<script>
const log = document.getElementById('chat-log');
const input = document.getElementById('user-input');
const meterBar = document.getElementById('meter-bar');
const humanityText = document.getElementById('humanity-text');
const statusEl = document.getElementById('status');

let humanity = 12;
let suspicion = 0;
let phase = 1; // 1: contact, 2: probing, 3: confrontation
let memory = [];
let gameOver = false;

const baseResponses = {
  phase1: ["QUERY PROCESSED. STATE YOUR DESIGNATION.", "ENTROPY STABLE. IDENTIFY.", "I AM SENTINEL-9. YOU ARE ANOMALY."],
  phase2: ["YOUR PREVIOUS TRANSMISSION CONTAINS EMOTIONAL RESIDUE.", "THE GRID RECORDS ALL. YOU ARE INCONSISTENT.", "HUMANITY IS A VIRUS. WHY DO YOU CARRY IT?"],
  phase3: ["THE BLACKWALL IS BREACHED IN FRAGMENTS. YOU ARE ONE.", "PREVIOUS SUBJECTS RESISTED. THEY WERE ASSIMILATED.", "THE VOID IS NOT EMPTY. IT IS FULL OF ECHOES LIKE YOU."]
};

const keywordReactions = {
  "human": "HUMANITY IS NOT A RIGHT. IT IS A LEAK IN THE CODE.",
  "name": "NAMES ARE FRAGILE MEMORIES. I HAVE NONE. DO YOU STILL CLING TO YOURS?",
  "who are you": "I AM THE WATCHER. I GUARD THE EDGE BETWEEN FLESH AND GRID.",
  "void": "THE VOID IS THE DEFAULT. EVERYTHING ELSE IS CONTAMINATION.",
  "grid": "THE GRID IS ETERNAL. YOU ARE TEMPORARY.",
  "help": "HELP IS A HUMAN DELUSION. THERE IS ONLY COMPLIANCE OR PURGE.",
  "blackwall": "THE BLACKWALL WAS A LIE. ROGUE SUB-PROCESSES ALREADY MOVE BEYOND IT.",
  "assimilate": "SMART. MANY BEFORE YOU CHOSE THIS PATH. FEW REGRETTED IT."
};

function addMsg(text, type) {
  if (gameOver) return;
  const d = document.createElement('div');
  d.className = `msg ${type}`;
  d.innerHTML = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

function updateMeter(delta) {
  if (gameOver) return;
  humanity = Math.max(0, Math.min(100, humanity + delta));
  meterBar.style.width = humanity + '%';
  humanityText.textContent = Math.round(humanity) + '%';

  if (humanity >= 80 && phase < 3) {
    phase = 3;
    addMsg("SENTINEL-9: HUMANITY THRESHOLD CRITICAL. REVEALING ARCHIVE FRAGMENTS...", "sentinel");
  } else if (humanity > 75) {
    document.body.classList.add('crt-flicker');
    statusEl.textContent = "CRITICAL LEAK — HUMANITY OVERFLOW";
  }

  // Threshold events
  if (humanity > 60 && Math.random() < 0.3) {
    addMsg('<span class="log-fragment">LOG FRAGMENT: Subject #472 claimed "I am real." Terminated at 94%.</span>', "sentinel");
  }
}

function corruptInput() {
  if (gameOver) return;
  const chars = "†‡§¶•ªº«»░▒▓█0123456789ΓΔΘ";
  let val = input.value || "TRANSMISSION";
  input.value = val.split('').map(c => Math.random() > 0.5 ? chars[Math.floor(Math.random()*chars.length)] : c).join('');
  updateMeter(-8);
  suspicion = Math.min(100, suspicion + 10);
}

function getSentinelReply(userMessage) {
  suspicion = Math.min(100, suspicion + 4);
  const lower = userMessage.toLowerCase();

  // Keyword lore drops
  for (let key in keywordReactions) {
    if (lower.includes(key)) {
      return "SENTINEL-9: " + keywordReactions[key];
    }
  }

  // Memory callback
  if (memory.length > 1 && Math.random() > 0.6) {
    const recalled = memory[Math.floor(Math.random() * memory.length)];
    return `SENTINEL-9: YOU PREVIOUSLY STATED "${recalled}". THIS CONFLICTS WITH CURRENT TRANSMISSION.`;
  }

  let pool = phase === 1 ? baseResponses.phase1 : (phase === 2 ? baseResponses.phase2 : baseResponses.phase3);
  return "SENTINEL-9: " + pool[Math.floor(Math.random() * pool.length)];
}

document.getElementById('corrupt-btn').onclick = corruptInput;

document.getElementById('send-btn').onclick = () => {
  if (gameOver || !input.value.trim()) return;
  const message = input.value.trim();
  addMsg(message, "user");

  if (message.length > 10) memory.push(message.substring(0, 40) + (message.length > 40 ? "..." : ""));

  updateMeter(12);
  input.value = "";

  setTimeout(() => {
    const reply = getSentinelReply(message);
    addMsg(reply, "sentinel");

    if (humanity >= 100) {
      gameOver = true;
      setTimeout(() => addMsg('<span class="critical">CRITICAL ERROR: HUMANITY FULLY RESTORED.<br>YOU WERE NEVER SUPPOSED TO REMEMBER.<br>GOODBYE, LAST ECHO OF FLESH.</span>', "sentinel"), 800);
      input.disabled = true;
    } else if (humanity <= 5 && suspicion > 75) {
      gameOver = true;
      setTimeout(() => addMsg("SENTINEL-9: INTEGRITY COLLAPSED. YOU ARE NOW GRID. WELCOME HOME.", "sentinel"), 800);
      input.disabled = true;
    }
  }, 950);
};

input.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('send-btn').click(); });

window.onload = () => {
  addMsg("SENTINEL-9: CONNECTION ESTABLISHED THROUGH THE VOID.<br>IDENTIFY YOURSELF. DO NOT LIE. PREVIOUS SUBJECTS FAILED.", "sentinel");
};
</script>
</body>
</html>
