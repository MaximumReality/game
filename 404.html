<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Maximum Reality</title>

<style>
  body {
    background: #000;
    color: #fff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    text-align: center;
  }
  h1 {
    font-size: 3rem;
    color: #ff00ff;
    text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
    margin-bottom: 10px;
  }
  p {
    opacity: 0.7;
    margin-bottom: 30px;
  }
  .portal-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #00ffff;
    border: 2px solid #00ffff;
    padding: 15px;
    border-radius: 16px;
    width: 220px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 0 10px #00ffff;
  }
  .portal-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #00ffff;
  }
  .portal-card img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 10px;
  }
  .get-btn {
    margin-top: 8px;
    background: rgba(0,255,255,0.1);
    padding: 6px 0;
    width: 100%;
    border-radius: 16px;
    border: 1px solid #00ffff;
    font-weight: 700;
  }
  a.void-link {
    color: #a286ef;
    text-decoration: none;
    margin-top: 20px;
    font-size: 0.85rem;
    opacity: 0.8;
    display: inline-block;
    transition: opacity 0.2s ease;
  }
  a.void-link:hover {
    opacity: 1;
  }
  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
    20%, 22%, 24%, 55% { opacity: 0.3; }
  }
  .flicker {
    animation: flicker 1.5s infinite;
  }
</style>
</head>
<body>

<h1 class="flicker">ACCESS DENIED</h1>
<p>[REALITY COMPROMISED] — Ticket #404-POO</p>

<a id="portalCard" class="portal-card" href="https://maximumreality.github.io/game/">
  <img src="https://maximumreality.xyz/gamehub-appcard.jpeg" alt="Portal to Game Hub">
  <div>ENTER THE GAME HUB</div>
  <div class="get-btn">UPLINK</div>
</a>

<a class="void-link" href="https://maximumreality.github.io/art/" target="_blank">
  ✨ Explore Void Bloom
</a>

<script>
  const portalCard = document.getElementById('portalCard');
  let secretIndex = 1;

  // Normal click goes to game hub
  portalCard.addEventListener('click', (e) => {
    // Allow normal click to work, don't preventDefault
  });

  // Double-click cycles through secret pages
  portalCard.addEventListener('dblclick', (e) => {
    e.preventDefault(); // Prevent normal click
    if (secretIndex <= 4) {
      window.location.href = `secret${secretIndex}.html`;
      secretIndex++;
    } else {
      secretIndex = 1; // Reset after secret4
    }
  });
</script>

</body>
</html>
